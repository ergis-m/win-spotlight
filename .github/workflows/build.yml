name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --config.onlyBuiltDependencies=[esbuild]

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Collect release assets
        id: assets
        shell: bash
        run: |
          mkdir -p release-assets
          cp src-tauri/target/release/bundle/msi/*.msi release-assets/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/nsis/*-setup.exe release-assets/ 2>/dev/null || true
          ls -la release-assets/

      - name: Upload artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: winapp-windows
          path: release-assets/*
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "WinApp ${{ github.ref_name }}"
          body: "See the assets below to download and install."
          files: release-assets/*
