name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --config.onlyBuiltDependencies=[esbuild]

      - name: Build Tauri app
        run: pnpm tauri build --bundles msi,nsis 2>&1 | tee build.log
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Show build output
        if: always()
        shell: bash
        run: |
          echo "=== Bundle directory ==="
          find src-tauri/target/release/bundle -type f 2>/dev/null || echo "No bundle directory found"
          echo "=== Release exe ==="
          ls -la src-tauri/target/release/*.exe 2>/dev/null || echo "No exe found"
          echo "=== Build log tail ==="
          tail -50 build.log 2>/dev/null || true

      - name: Collect release assets
        id: assets
        shell: bash
        run: |
          mkdir -p release-assets
          cp src-tauri/target/release/bundle/msi/*.msi release-assets/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/msi/*.msi.zip release-assets/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/msi/*.msi.zip.sig release-assets/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/nsis/*-setup.exe release-assets/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/nsis/*.nsis.zip release-assets/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/nsis/*.nsis.zip.sig release-assets/ 2>/dev/null || true
          ls -la release-assets/

      - name: Generate latest.json updater manifest
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          NSIS_SIG=$(cat src-tauri/target/release/bundle/nsis/*.nsis.zip.sig 2>/dev/null || echo "")
          NSIS_ZIP=$(basename src-tauri/target/release/bundle/nsis/*.nsis.zip 2>/dev/null | sed 's/ /./g' || echo "")

          cat > release-assets/latest.json << EOF
          {
            "version": "${VERSION}",
            "pub_date": "${DATE}",
            "platforms": {
              "windows-x86_64": {
                "signature": "${NSIS_SIG}",
                "url": "https://github.com/ergis-m/win-spotlight/releases/download/${TAG}/${NSIS_ZIP}"
              }
            }
          }
          EOF

          echo "=== latest.json ==="
          cat release-assets/latest.json

      - name: Upload artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: win-spotlight-windows
          path: release-assets/*
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "Win Spotlight ${{ github.ref_name }}"
          body: "See the assets below to download and install."
          files: release-assets/*
