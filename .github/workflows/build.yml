name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build --bundles nsis 2>&1 | tee build.log
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          RUSTC_WRAPPER: sccache

      - name: Show build output
        if: always()
        shell: bash
        run: |
          echo "=== Bundle directory ==="
          find src-tauri/target/release/bundle -type f 2>/dev/null || echo "No bundle directory found"
          echo "=== Build log tail ==="
          tail -50 build.log 2>/dev/null || true
          echo "=== sccache stats ==="
          sccache --show-stats 2>/dev/null || true

      - name: Collect release assets
        id: assets
        shell: bash
        run: |
          mkdir -p release-assets
          cp src-tauri/target/release/bundle/nsis/*-setup.exe release-assets/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/nsis/*.nsis.zip release-assets/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/nsis/*.nsis.zip.sig release-assets/ 2>/dev/null || true
          # Create a stable-named copy for the "latest download" URL
          for f in release-assets/*-setup.exe; do
            cp "$f" release-assets/Win-Spotlight-setup.exe
            break
          done
          ls -la release-assets/

      - name: Generate latest.json updater manifest
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          NSIS_SIG=$(cat src-tauri/target/release/bundle/nsis/*.nsis.zip.sig 2>/dev/null || echo "")
          NSIS_ZIP=$(basename src-tauri/target/release/bundle/nsis/*.nsis.zip 2>/dev/null | sed 's/ /./g' || echo "")

          cat > release-assets/latest.json << EOF
          {
            "version": "${VERSION}",
            "pub_date": "${DATE}",
            "platforms": {
              "windows-x86_64": {
                "signature": "${NSIS_SIG}",
                "url": "https://github.com/ergis-m/win-spotlight/releases/download/${TAG}/${NSIS_ZIP}"
              }
            }
          }
          EOF

          echo "=== latest.json ==="
          cat release-assets/latest.json

      - name: Upload artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: win-spotlight-windows
          path: release-assets/*
          retention-days: 14

      - name: Extract changelog notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"

          # Pull the section for this version out of CHANGELOG.md: everything
          # between "## [VERSION]" and the next "## [" heading (or the trailing
          # link-reference block). Literal index() matching avoids regex pitfalls
          # with the "[" and "." characters in version headings.
          NOTES=$(awk -v needle="## [$VERSION]" '
            index($0, needle) == 1 { capture=1; next }
            capture && index($0, "## [") == 1 { exit }
            capture && index($0, "[") == 1 { exit }
            capture { buf[n++] = $0 }
            END {
              start = 0
              while (start < n && buf[start] ~ /^[[:space:]]*$/) start++
              end = n - 1
              while (end >= start && buf[end] ~ /^[[:space:]]*$/) end--
              for (i = start; i <= end; i++) print buf[i]
            }
          ' CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            NOTES="See the assets below to download and install."
          fi

          {
            printf '%s\n\n' "$NOTES"
            printf '%s\n' "See the assets below to download and install."
          } > release-notes.md

          echo "=== release-notes.md ==="
          cat release-notes.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          name: "Win Spotlight ${{ github.ref_name }}"
          body_path: release-notes.md
          files: release-assets/*
